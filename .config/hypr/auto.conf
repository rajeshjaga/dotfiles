
#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprpaper --config ~/.config/hypr/hyprpaper/hyprpaper.conf &
exec = waybar --config ~/.config/waybar/config.json &
exec = mako &
exec = gsettings set org.gnome.desktop.interface gtk-theme "rose-pine-gtk" &
exec = gsettings set org.gnome.desktop.interface cursor-theme "Oreo-White-Cusor" &
exec = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark" &
exec = gsettings set "$gnome_schema" font-name "JetBrainsMono Nerd Font"&
exec-once = flameshot 
exec-once = nm-applet --indicator &
exec-once = blueman-applet &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
# exec = hypridle

