#   MONITORS

monitor=eDP-1,1920x1080@144,0x0,1
monitor=HDMI-A-1,1920x1080,1920x0,1

# INPUT


input {
    kb_model = pc105
    kb_layout = 
    kb_variant = qwerty
    kb_model = us
    follow_mouse = 1
    sensitivity = 0
    numlock_by_default=true
    touchpad {
        disable_while_typing = true
        natural_scroll = true
        scroll_factor = 1
        tap-to-click = true
        tap-and-drag = true
    }
}
cursor{
    no_hardware_cursors=true
}

gestures {
    workspace_swipe = false
    workspace_swipe_fingers = 3
}
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

