# multimedia keybinds

# Requires requires pactl pipewire-pulseaudio, Audio related binds
bindel = ,XF86AudioRaiseVolume,         exec, ~/.config/scripts/volume.sh  -u
bindel = ,XF86AudioLowerVolume,         exec, ~/.config/scripts/volume.sh -d
bindel = ,XF86AudioMute,                exec, ~/.config/scripts/volume.sh -m
#bindel = ,XF86AudioMicMute,            exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# laptop in-built display brightness, laptop display brightness related bind
bindel = ,XF86MonBrightnessUp,          exec, ~/.config/scripts/brightness up
bindel = ,XF86MonBrightnessDown,        exec, ~/.config/scripts/brightness down

# Requires playerctl, play pause prev next related bindings
bindl = , XF86AudioNext,                exec, playerctl next
bindl = , XF86AudioPause,               exec, playerctl play-pause
bindl = , XF86AudioPlay,                exec, playerctl play-pause
bindl = , XF86AudioPrev,                exec, playerctl previous


#bind = $mainMod Shift, S,               exec, flameshot full
bind = $mainMod Shift, S,               exec, flameshot gui
