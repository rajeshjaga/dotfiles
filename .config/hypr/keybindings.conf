$terminal = kitty
$fileManager = pcmanfm
$menu = rofi -show drun
$browser=thorium-browser
$browser-alt=firefox
$run=wofi --show drun

# Setting 'Win' key as meta/mod key
$mainMod = SUPER

# Setting key binding for hypr's native functions
bind = $mainMod, Space, togglefloating, 
bind = $mainMod Shift, W, togglesplit, 
bind = $mainMod, W, togglegroup, 
bind = $mainMod Shift, C, killactive, 
bind = $mainMod Shift, Q, exit, 
bind = $mainMod, P, pseudo,
bind = $mainMod, F, fullscreen,

# binding few things
bind = $mainMod, i, exec , $HOME/dotfiles/.config/hypr/barrestart.sh
bind = $mainMod Shift, R, exec, $HOME/dotfiles/.config/hypr/hyprpaper/hyprpaper.sh
bind = $mainMod Shift, b, exec, $browser-alt
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, b, exec, $browser
bind = $mainMod, D, exec, $run
bind = $mainMod, R, exec, $menu
bind = $mainMod, X, exec, swaylock -i ~/Pictures/wally/1.jpg --indicator-x-position 90 --indicator-y-position 1000
bind = $mainMod, Tab, cyclenext,
bind = $mainMod, Q, forcerendererreload,
# bind = $mainMod Shift, E, alterzorder 10,

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move the selected window + vimkeys
bind = $mainMod Shift, h, movewindow, l
bind = $mainMod Shift, l, movewindow, r
bind = $mainMod Shift, k, movewindow, u
bind = $mainMod Shift, j, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume up, Volume Down, Mute
bindel =, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Laptop brightness
bindl=,XF86MonBrightnessUp, exec, $HOME/dotfiles/.config/scripts/brightness up
bindl=,XF86MonBrightnessDown, exec, $HOME/dotfiles/.config/scripts/brightness down

# Lid Switch

# trigger when the switch is toggled
bindl=,switch:[Lid Switch],exec, swaylock -i ~/Pictures/wally/1.jpg --indicator-x-position 90 --indicator-y-position 1000

# trigger when the switch is turning on
bindl=,switch:on:[Lid Switch],exec,hyprctl keyword monitor ", disable"

# trigger when the switch is turning off
bindl=,switch:off:[Lid Switch],exec,hyprctl keyword monitor ", 1920x1080@60.00, auto, 1"


# will switch to a submap called resize
bind=ALT,R,submap,resize

# will start a submap called "resize"
submap=resize

# sets repeatable binds for resizing the active window
binde=,l,resizeactive,10 0
binde=,h,resizeactive,-10 0
binde=,k,resizeactive,0 -10
binde=,j,resizeactive,0 10

# use reset to go back to the global submap
bind=,escape,submap,reset 

# will reset the submap, meaning end the current one and return to the global one
submap=reset
