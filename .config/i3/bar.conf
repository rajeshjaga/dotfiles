bar {
    status_command i3blocks -c ~/dotfiles/.config/i3/i3blocks.conf
        position top
        output eDP1
        output HDMI-1-0
        hidden_state hide
        font pango:JetBrains Mono Nerd Font 13
        binding_mode_indicator yes
        padding 1px
        tray_padding 5px
        colors{
            background         $base
                statusline         $base
                focused_statusline $text
                focused_separator  $blue
                focused_workspace  $base $base $flamingo
                active_workspace   $base $base $rosewater
                inactive_workspace $base $base $sky
                urgent_workspace   $base $base $red
                binding_mode       $base $base $surface1
        }
}
