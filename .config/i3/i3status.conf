general {
        output_format="i3bar"
        colors = true
        interval = 5
        color_good="#cdd6f4"
}

order += "wireless wlan0"
order += "battery all"
order += "disk /"
order += "load"
order += "memory"
order += "tztime local"
order += "read_file uptime"
order += "cpu_temperature 0"


wireless wlan0{
    format_up = "  %essid"
    format_down = "  down"
}
read_file 0 {
        format = "T: %degrees °C"
        path = "/sys/devices/platform/coretemp.0/hwmon/hwmon6/temp1_input"
}
battery all {
        format = "  %percentage"
}

disk "/" {
        format = "  %avail"
}

load {
        format = " %1min"
}

memory {
        format = " %used"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}
read_file uptime {
        format = " %content%"
        path = "/sys/class/backlight/acpi_video0/brightness"
}
tztime local {
        format = " %H:%M"
}
