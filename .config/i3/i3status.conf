general {
        output_format="i3bar"
        colors = true
        interval = 5
        color_good="#9ccfd8"
        color_degraded="#f6c177"
        color_bad="#eb6f92"
}

order += "wireless wlp0s20f3"
order += "battery all"
order += "volume master"
order += "cpu_temperature 0"
order += "cpu_usage"
order += "memory"
order += "tztime local"


wireless wlp0s20f3{
    format_up = "W: %essid(%ip)"
    format_down = ""
}
ethernet eth0{
    format_up = "E: %ip"
    format_down = ""
}
battery all {
        format = "Bat: %percentage %status "
        status_chr = "󰂄 "
        status_bat = "󰁹 "
        status_full = "󱟢 "
        status_unk = "󱉝 "
        low_threshold = 25
}
cpu_temperature 0{
    format= "CPU: %degrees°C"
}
cpu_usage{
    format = "Load: %usage"
    max_threshold = 70
}
volume master {
        format = "Vol: %volume"
        format_muted = "Vol: Muted (%volume)"
        device = "default"
        mixer = "Master"
        mixer_idx = 0
}

memory {
        format = "Ram: %used"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}
tztime local {
        format = "%d-%m/%H:%M"
}
