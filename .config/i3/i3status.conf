general {
        output_format="i3bar"
        colors = true
        interval = 5
        separator=" "
}

order += "wireless wlan0"
order += "battery all"
order += "disk /"
order += "load"
order += "memory"
order += "tztime local"


wireless wlan0{
                   format_up = "w: %essid"
                   format_down = "W: down"
}


battery all {
        format = "%status %percentage %remaining"
}

disk "/" {
        format = "%avail"
}

load {
        format = "%1min"
}

memory {
        format = "%used|%available"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}

tztime local {
        format = "%d-%m|%H:%M"
}
