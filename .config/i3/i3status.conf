general {
        output_format="i3bar"
        colors = true
        interval = 5
        color_good="#cdd6f4"
}

order += "wireless wlp0s20f3"
order += "battery all"
order += "disk /"
order += "load"
order += "memory"
order += "tztime local"
order += "cpu_temperature 0"


wireless wlp0s20f3{
    format_up = "  %essid"
    format_down = "  down"
}
battery all {
        format = "  %percentage"
}

disk "/" {
        format = "  %avail"
}

load {
        format = " %1min"
}

memory {
        format = " %used"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}
tztime local {
        format = " %H:%M"
}
