[colors]
background = #191724
background-alt = #21202e
foreground = #e0def4
primary = #ebbcba
secondary = #f6c177
green = #9ccfd8
alert = #eb6f92
disabled = #6e6a86


[bar/mybar]
width = 100%
height = 32
radius = 0
; dpi = 96
background = #00000000
foreground = ${colors.foreground}
line-size = 0pt
border-top-size = 10px
border-bottom-size = 10px
border-left-size = 10px
border-right-size = 10px
border-color = #00000000
padding-left = 0
padding-right = 0
module-margin = 0
separator = | 
separator-foreground = #00000000
font-0 = JetBrainsMono Nerd Font;2
modules-left = workspaces 
modules-center = date
modules-right =  battery pulseaudio xbacklight cpu wlan eth systray
cursor-click = pointer
cursor-scroll = ns-resize
monitor = eDP-1
enable-ipc = false

[bar/secbar]
width = 100%
height = 32
radius = 0
; dpi = 96
background = #00000000
foreground = ${colors.foreground}
line-size = 3pt
border-top-size = 10px
border-bottom-size = 10px
border-left-size = 10px
border-right-size = 10px
border-color = #00000000
padding-left = 0
padding-right = 0
module-margin = 0
separator = |
separator-foreground = #00000000
font-0 = JetBrainsMono Nerd Font;2
modules-left = workspaces 
modules-center = date
modules-right =  battery pulseaudio memory cpu wlan eth
cursor-click = pointer
cursor-scroll = ns-resize
monitor = HDMI-1-0
enable-ipc = false

[module/systray]
type = internal/tray
format-margin = 0pt
format-padding = 1
tray-spacing = 10pt
format-background = ${colors.background-alt}
tray-background = ${colors.background-alt}

[module/workspaces]
type = internal/i3
index-sort = true
enable-click = true
format = <label-state> <label-mode>

label-mode-background = ${colors.background-alt}
label-mode-foreground = ${colors.foreground}
label-mode-padding = 1

label-focused = +
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.foreground}
label-focused-padding = 1

label-unfocused = %index%
label-unfocused-background = ${colors.disabled}
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 1

label-visible = %index%
label-visible-background = ${colors.disabled}
label-visible-foreground = ${colors.background-alt}
label-visible-padding = 1

label-urgent = x
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background-alt}
label-urgent-padding = 1

label-separator =  " "
label-separator-padding = 0
pin-workspace = true

[module/xbacklight]
type = internal/backlight
format = <label>
format-prefix = LIG
format-prefix-foreground = ${colors.background-alt}
format-prefix-background = ${colors.primary}
format-prefix-padding = 1
label = %percentage%
label-foreground = ${colors.primary}
label-background = ${colors.background-alt}
label-padding = 1
enable-scroll = true

[module/battery]
type = internal/battery
full-at = 90
low-at = 20
battery = BAT0
adapter = ADP1

format-charging = <label-charging>
format-discharging = <label-discharging>

label-charging =  %percentage%%
label-charging-background = ${colors.green}
label-charging-foreground = ${colors.background-alt}
label-charging-padding = 1
format-charging-prefix = "CHR"
format-charging-prefix-foreground = ${colors.green}
format-charging-prefix-background = ${colors.background-alt}
format-charging-prefix-padding = 1

label-full = %percentage%%
label-full-foreground = ${colors.green}
label-full-background = ${colors.background-alt}
label-full-padding = 1
format-full-prefix = "BAT"
format-full-prefix-foreground = ${colors.background-alt}
format-full-prefix-background = ${colors.green}
format-full-prefix-padding = 1

label-discharging-foreground = ${colors.green}
label-discharging-background = ${colors.background-alt}
label-discharging-padding = 1
format-discharging-prefix = "BAT"
format-discharging-prefix-foreground = ${colors.background-alt}
format-discharging-prefix-background = ${colors.green}
format-discharging-prefix-padding = 1


[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>

label-volume = %percentage%%
label-volume-foreground = ${colors.secondary}
label-volume-background = ${colors.background-alt}
label-volume-padding = 1

format-volume-prefix = "VOL"
format-volume-prefix-foreground = ${colors.background-alt}
format-volume-prefix-background = ${colors.secondary}
format-volume-prefix-padding = 1

label-muted = Mute
label-muted-foreground = ${colors.background-alt}
label-muted-background = ${colors.alert}
label-muted-padding = 2
click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 3
format = <label>

label = "%percentage_used%%"
label-background = ${colors.background-alt}
label-foreground = ${colors.primary}
label-padding = 1

format-prefix = "RAM"
format-foreground = ${colors.background-alt}
format-background = ${colors.primary}
format-prefix-padding = 1

[module/cpu]
type = internal/temperature

interval = 0.5
thermal-zone = 0
base-temperature = 40
warn-temperature = 60
format = <label>

label =  %temperature-c%
label-background = ${colors.background-alt}
label-foreground = ${colors.green}
label-padding = 1
format-prefix = CPU
format-prefix-background = ${colors.green}
format-prefix-foreground = ${colors.background-alt}
format-prefix-padding = 1

label-warn = %temperature-c%
label-warn-background = ${colors.alert}
label-warn-foreground = ${colors.green}
label-warn-padding = 1
format-warn-prefix = CPU
format-warn-prefix-background = ${colors.green}
format-warn-prefix-foreground = ${colors.background-alt}
format-warn-prefix-padding = 1


[module/wlan]
type = internal/network
interface = wlp0s20f3
interface-type = wireless
format-connected = <label-connected>

label-connected =  %essid%
label-connected-foreground = ${colors.secondary}
label-connected-background = ${colors.background-alt}
label-connected-padding = 1

format-connected-prefix = Wifi
format-connected-prefix-background = ${colors.secondary}
format-connected-prefix-foreground = ${colors.background-alt}
format-connected-prefix-padding = 1

format-disconnected = <label-disconnected>

label-disconnected =  NaN
label-disconnected-foreground = ${colors.background-alt}
label-disconnected-background = ${colors.alert}
label-disconnected-padding = 1

format-disconnected-prefix = Wifi
format-disconnected-prefix-background = ${colors.background-alt}
format-disconnected-prefix-foreground = ${colors.alert}
format-disconnected-prefix-padding = 1

[module/eth]
type = internal/network
interface = eno1
interface-type = wired
format = <label-connected>

label-connected = %local_ip%
label-connected-foreground = ${colors.secondary}
label-connected-background = ${colors.background-alt}
label-connected-padding = 1

format-connected-prefix = %ifname%
format-connected-prefix-background = ${colors.secondary}
format-connected-prefix-foreground = ${colors.background-alt}
format-connected-prefix-padding = 1

format-disconnected =
label-disconnected = 

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.background}
label-background = ${colors.primary}
label-padding = 1

