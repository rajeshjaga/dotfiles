[module/battery]
type=internal/battery
battery=BAT0
adapter=ADP1

format-charging            = <ramp-capacity> <label-charging>
format-charging-foreground = ${colors.background}
format-charging-background = ${colors.foreground}

label-charging            = " %percentage%% "
label-charging-foreground = ${colors.foreground}
label-charging-background = ${colors.primary}

format-discharging            = <ramp-capacity> <label-discharging>
format-discharging-foreground = ${colors.background}
format-discharging-background = ${colors.foreground}

label-discharging            = " %percentage%% "
label-discharging-foreground = ${colors.foreground}
label-discharging-background = ${colors.primary}

ramp-capacity-0 = "  "
ramp-capacity-1 = "  "
ramp-capacity-2 = "  "
ramp-capacity-3 = "  "
ramp-capacity-4 = "  "

bar-capacity-width = 10

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix            = "   "
format-volume-prefix-foreground = ${colors.background}
format-volume-prefix-background = ${colors.foreground}

format-volume            = <label-volume>
format-volume-foreground = ${colors.foreground}
format-volume-background = ${colors.primary}

label-volume = " %percentage%% "

format-muted-prefix = " VOL "
label-muted = muted

label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2

format-prefix = "   "
format-prefix-foreground = ${colors.background}
format-prefix-background = ${colors.foreground}

label = " %percentage_used:2%% "
label-foreground = ${colors.foreground}
label-background = ${colors.primary}



[module/cpu]
type = internal/cpu
interval = 2

format-prefix = "   "
format-prefix-foreground = ${colors.background}
format-prefix-background = ${colors.foreground}

label = " %percentage:2%% "
label-foreground = ${colors.foreground}
label-background = ${colors.primary}

[module/temperature]
type = internal/temperature
interval = 0.5
thermal-zone = 0
base-temperature = 20
warn-termperature = 60
units = true

format-prefix = " 󰏈  "
format-prefix-background = ${colors.foreground}
format-prefix-foreground = ${colors.background}

label = " %temperature-c% "
label-background = ${colors.primary}
label-foreground = ${colors.foreground}

label-warn = " %temperature-c% "
label-warn-background = ${colors.alert}
label-warn-foreground = ${colors.foreground}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

format-prefix = "   "
format-prefix-background = ${colors.foreground}
format-prefix-foreground = ${colors.background}

label = " %date% "
label-foreground = ${colors.foreground}
label-background = ${colors.primary}

[module/i3]
type = internal/i3

label-mode = " %mode% "
label-mode-background = ${colors.foreground}
label-mode-foreground = ${colors.background}
label-mode-padding = 1

label-focused = " %name% "
label-focused-background = ${colors.foreground}
label-focused-foreground = ${colors.secondary}
label-focused-padding = 0


label-unfocused = " %name% "
label-unfocused-background = ${colors.foreground}
label-unfocused-foreground = ${colors.alert}
label-unfocused-padding = 0

label-visible = " %name% "
label-visible-background = ${colors.secondary-alt}
label-visible-foreground = ${colors.foreground}
label-visible-padding = 0

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

label-separator = | 
label-seperator-padding = 1
label-seperator-foreground = ${colors.background}
label-seperator-background = ${colors.background}

[module/xwindow]
type = internal/xwindow

format-prefix = " 󰍹  "
format-prefix-background = ${colors.foreground}
format-prefix-foreground = ${colors.background}

label = %class:0:30:...%
label-background = ${colors.primary}
label-foreground = ${colors.foreground}

label-padding-left = 1
label-padding-right = 1

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt
