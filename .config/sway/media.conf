bindsym Print exec flameshot full

bindsym --locked XF86AudioMute          exec ~/.config/scripts/volume.sh -m
bindsym --locked XF86AudioLowerVolume   exec ~/.config/scripts/volume.sh -d
bindsym --locked XF86AudioRaiseVolume   exec ~/.config/scripts/volume.sh -u
bindsym --locked XF86AudioMicMute       exec pactl set-source-mute \@DEFAULT_SOURCE@ toggle
bindsym --locked XF86AudioPlay          exec playerctl play-pause
bindsym --locked XF86AudioNext          exec playerctl next
bindsym --locked XF86AudioPrev          exec playerctl previous
bindsym --locked XF86AudioStop          exec playerctl stop
bindsym --locked XF86MonBrightnessDown  exec ~/.config/scripts/brightness down
bindsym --locked XF86MonBrightnessUp    exec ~/.config/scripts/brightness up
